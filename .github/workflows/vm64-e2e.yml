name: VM64 end-to-end

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vm64-e2e-${{ github.event.pull_request.number || github.ref }}
  # A canceled owned lifecycle cannot complete its 20-minute finalizer and
  # artifact upload inside GitHub's short cancellation grace period.
  cancel-in-progress: false

jobs:
  vm64-unit:
    name: Root Go unit tests
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Check out the tested revision
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up root-module Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
          cache: true

      - name: Run root tests and vet
        shell: bash
        run: |
          set -Eeuo pipefail
          go test -count=1 -timeout=20m \
            -covermode=atomic -coverprofile="$RUNNER_TEMP/vm64-root.coverage" ./...
          go vet ./...

      - name: Run race-sensitive VM64 packages
        shell: bash
        run: |
          set -Eeuo pipefail
          go test -count=1 -race -timeout=20m \
            ./accounts/abi/... \
            ./accounts/external \
            ./cmd/devp2p/... \
            ./cmd/qrlkey \
            ./common \
            ./console \
            ./core/vm \
            ./core/vm/runtime \
            ./internal/jsre

      - name: Run bounded native fuzzing
        shell: bash
        run: |
          set -Eeuo pipefail
          go test -run='^$' -fuzz='^FuzzAddressTextAndJSONRoundTrip$' -fuzztime=20s -parallel=2 ./common
          go test -run='^$' -fuzz='^FuzzABI$' -fuzztime=20s -parallel=2 ./accounts/abi
          go test -run='^$' -fuzz='^FuzzVmRuntime$' -fuzztime=20s -parallel=2 ./core/vm/runtime
          go test -run='^$' -fuzz='^FuzzPrecompiledContracts$' -fuzztime=20s -parallel=2 ./core/vm
          go test -run='^$' -fuzz='^FuzzDepositRootInputCompatibility$' -fuzztime=20s -parallel=2 ./core/vm

      - name: Upload root coverage
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: vm64-root-coverage-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/vm64-root.coverage
          if-no-files-found: warn
          retention-days: 14

  vm64-e2e-unit:
    name: E2E harness unit tests (Go 1.26)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Check out the tested revision
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up E2E-module Go 1.26
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.26.0'
          cache-dependency-path: |
            go.sum
            scripts/testing/e2e/go.sum
          cache: true

      - name: Validate workflow, scripts, JavaScript, and generated artifacts
        shell: bash
        run: |
          set -Eeuo pipefail
          go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
          find scripts/local_testnet scripts/testing/e2e scripts/upload-github-release-asset.sh \
            -type f -name '*.sh' -print0 |
            xargs -0 docker run --rm \
              --network=none \
              -v "$PWD:/mnt:ro" \
              -w /mnt \
              koalaman/shellcheck@sha256:bb596a0d169b85ddd81d8b6d3a2ff6d5baf5fca10b97f575ebc647c3dff62b3d \
              --severity=warning
          if grep -R -n --include='*.sh' 'testing/e2e' scripts/local_testnet; then
            echo 'Network provisioning scripts must not depend on the E2E suite.' >&2
            exit 1
          fi
          for script in scripts/testing/e2e/testdata/console/*.js scripts/testing/e2e/testdata/contracts/*.js; do
            node --check "$script"
          done
          python3 scripts/testing/e2e/lifecycle_state_test.py
          scripts/testing/e2e/lifecycle_lib_test.sh
          scripts/testing/e2e/run_live_stages_test.sh
          scripts/testing/e2e/recover_enclave_uuid_test.sh
          deadline_guard_smoke_epoch=$(( $(date +%s) + 60 ))
          VM64_E2E_PRE_CLEANUP_DEADLINE_EPOCH="$deadline_guard_smoke_epoch" \
            scripts/testing/e2e/run_before_deadline.sh true
          scripts/local_testnet/prepare_local_testnet_test.sh
          python3 scripts/local_testnet/vm64_genesis_gqrl.py --self-test
          go -C scripts/testing/e2e generate ./suites/goabi
          (
            cd scripts/testing/e2e/testdata/contracts
            go run generate_emitter_js.go
          )
          git diff --exit-code -- \
            scripts/testing/e2e/suites/goabi/emitter_binding.go \
            scripts/testing/e2e/testdata/contracts/emitter.js

      - name: Run nested E2E-module tests, vet, and build
        shell: bash
        run: |
          set -Eeuo pipefail
          go -C scripts/testing/e2e test -count=1 -timeout=30m \
            -covermode=atomic -coverprofile="$RUNNER_TEMP/vm64-e2e.coverage" ./...
          go -C scripts/testing/e2e vet ./...
          go -C scripts/testing/e2e build -o "$RUNNER_TEMP/vm64e2e" ./cmd/vm64e2e

      - name: Run the nested E2E module with the race detector
        shell: bash
        run: |
          set -Eeuo pipefail
          go -C scripts/testing/e2e test -count=1 -race -timeout=30m ./...

      - name: Upload E2E harness coverage
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: vm64-e2e-unit-coverage-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/vm64-e2e.coverage
          if-no-files-found: warn
          retention-days: 14

  hyperion-fixture:
    name: Pinned Hyperion fixture
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Check out the tested revision
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go 1.26
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.26.0'
          cache-dependency-path: |
            go.sum
            scripts/testing/e2e/go.sum
          cache: true

      - name: Recompile the VM64 fixture with the pinned Hyperion toolchain
        env:
          HYPERION_BUILD_JOBS: 2
        run: make vm64-fixture-check

  local-testnet:
    name: Live VM64 lifecycle
    needs:
      - vm64-unit
      - vm64-e2e-unit
      - hyperion-fixture
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      KURTOSIS_VERSION: 1.20.0
      KURTOSIS_SHA256: 20e924582082f0cd2b557b463ffcb0a303b6f90ef25204e794384741d88986fc
      YQ_VERSION: v4.47.2
      YQ_SHA256: 1bb99e1019e23de33c7e6afc23e93dad72aad6cf2cb03c797f068ea79814ddb0
      ENCLAVE_NAME: vm64-${{ github.run_id }}-${{ github.run_attempt }}
      ARTIFACT_DIR: /tmp/vm64-${{ github.run_id }}-${{ github.run_attempt }}
      VM64E2E_BIN: /tmp/vm64e2e-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Check out the tested revision
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Initialize immutable run inputs
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p "$ARTIFACT_DIR"
          source_sha=$(git rev-parse HEAD)
          deadline_origin_epoch=$(date +%s)
          job_deadline_epoch=$((deadline_origin_epoch + 360 * 60))
          pre_cleanup_deadline_epoch=$((deadline_origin_epoch + 300 * 60))
          runner_deadline_epoch=$((deadline_origin_epoch + 325 * 60))
          echo "SOURCE_SHA=$source_sha" >> "$GITHUB_ENV"
          echo "VM64_E2E_JOB_DEADLINE_EPOCH=$job_deadline_epoch" >> "$GITHUB_ENV"
          echo "VM64_E2E_PRE_CLEANUP_DEADLINE_EPOCH=$pre_cleanup_deadline_epoch" >> "$GITHUB_ENV"
          echo "VM64_E2E_RUNNER_DEADLINE_EPOCH=$runner_deadline_epoch" >> "$GITHUB_ENV"
          printf 'source_sha=%s\nenclave_name=%s\njob_deadline_epoch=%s\npre_cleanup_deadline_epoch=%s\nrunner_deadline_epoch=%s\n' \
            "$source_sha" "$ENCLAVE_NAME" "$job_deadline_epoch" \
            "$pre_cleanup_deadline_epoch" "$runner_deadline_epoch" \
            > "$ARTIFACT_DIR/ci-inputs.txt"

      - name: Set up E2E-module Go 1.26
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.26.0'
          cache-dependency-path: |
            go.sum
            scripts/testing/e2e/go.sum
          cache: true

      - name: Install pinned local-testnet tooling and start Kurtosis
        timeout-minutes: 15
        shell: bash
        run: |
          set -Eeuo pipefail
          curl -fsSL "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -o /tmp/yq
          echo "${YQ_SHA256}  /tmp/yq" | sha256sum --check
          sudo install -m 0755 /tmp/yq /usr/local/bin/yq

          kurtosis_deb="/tmp/kurtosis-cli_${KURTOSIS_VERSION}_linux_amd64.deb"
          curl -fsSL \
            "https://github.com/kurtosis-tech/kurtosis-cli-release-artifacts/releases/download/${KURTOSIS_VERSION}/kurtosis-cli_${KURTOSIS_VERSION}_linux_amd64.deb" \
            -o "$kurtosis_deb"
          echo "${KURTOSIS_SHA256}  ${kurtosis_deb}" | sha256sum --check
          sudo dpkg --install "$kurtosis_deb"
          kurtosis engine start 2>&1 | tee "$ARTIFACT_DIR/kurtosis-engine-start.log"

      - name: Build the vm64e2e runner
        shell: bash
        run: |
          set -Eeuo pipefail
          go -C scripts/testing/e2e build -o "$VM64E2E_BIN" ./cmd/vm64e2e
          "$VM64E2E_BIN" help > "$ARTIFACT_DIR/vm64e2e-help.txt"
          {
            go version
            docker version
            yq --version
            kurtosis version
          } > "$ARTIFACT_DIR/versions.txt" 2>&1

      - name: Smoke-test the Kurtosis SDK against the real engine
        timeout-minutes: 5
        shell: bash
        run: |
          set -Eeuo pipefail
          VM64_E2E_REAL_ENGINE_SMOKE=1 go -C scripts/testing/e2e test -count=1 \
            -run '^TestSDKClientRealEngineSmoke$' ./internal/kurtosis

      - name: Run vm64e2e doctor
        timeout-minutes: 10
        shell: bash
        run: |
          set -Eeuo pipefail
          "$VM64E2E_BIN" doctor \
            --repo-root "$GITHUB_WORKSPACE" \
            --source-sha "$SOURCE_SHA" \
            --network-params "$GITHUB_WORKSPACE/scripts/local_testnet/network_params.yaml" \
            --results "$ARTIFACT_DIR" \
            --global-timeout 6h \
            --cleanup-reserve 1h \
            --ci 2>&1 | tee "$ARTIFACT_DIR/doctor.log"

      - name: Run the owned VM64 lifecycle
        timeout-minutes: 330
        shell: bash
        run: |
          set -Eeuo pipefail
          run_log="$RUNNER_TEMP/vm64e2e-run.log"
          now_epoch=$(date +%s)
          remaining_seconds=$((VM64_E2E_RUNNER_DEADLINE_EPOCH - now_epoch))
          cleanup_reserve_seconds=$((VM64_E2E_RUNNER_DEADLINE_EPOCH - VM64_E2E_PRE_CLEANUP_DEADLINE_EPOCH))
          if [ "$remaining_seconds" -le 0 ]; then
            echo 'The absolute VM64 runner deadline has already been reached.' >&2
            exit 1
          fi
          if [ "$cleanup_reserve_seconds" -le 0 ]; then
            echo 'The VM64 cleanup reserve derived from the absolute deadlines is not positive.' >&2
            exit 1
          fi
          if [ "$remaining_seconds" -le "$cleanup_reserve_seconds" ]; then
            echo 'The absolute VM64 pre-cleanup deadline has already been reached.' >&2
            exit 1
          fi
          set +e
          "$VM64E2E_BIN" run \
            --repo-root "$GITHUB_WORKSPACE" \
            --source-sha "$SOURCE_SHA" \
            --network-params "$GITHUB_WORKSPACE/scripts/local_testnet/network_params.yaml" \
            --results "$ARTIFACT_DIR" \
            --enclave "$ENCLAVE_NAME" \
            --global-timeout "${remaining_seconds}s" \
            --cleanup-reserve "${cleanup_reserve_seconds}s" \
            --preserve-on-failure=true \
            --ci 2>&1 | tee "$run_log"
          run_pipeline_status=("${PIPESTATUS[@]}")
          run_status=${run_pipeline_status[0]}
          run_log_status=${run_pipeline_status[1]}
          set -e
          if [ "$run_log_status" -ne 0 ]; then
            echo 'Could not preserve the initial lifecycle log; refusing to hide the artifact failure.' >&2
            exit "$run_log_status"
          fi
          if [ "$run_status" -eq 0 ]; then
            exit 0
          fi

          checkpoint="$ARTIFACT_DIR/checkpoint.json"
          if [ ! -s "$checkpoint" ]; then
            echo "The initial lifecycle failed before creating a resumable checkpoint." >&2
            exit "$run_status"
          fi
          now_epoch=$(date +%s)
          remaining_seconds=$((VM64_E2E_RUNNER_DEADLINE_EPOCH - now_epoch))
          if [ "$remaining_seconds" -le "$cleanup_reserve_seconds" ]; then
            echo 'The initial lifecycle failed after the pre-cleanup deadline; preserving diagnostics for finalization.' >&2
            exit "$run_status"
          fi

          echo 'The initial lifecycle failed; resuming the same checkpoint and enclave without replaying completed stages.' | tee -a "$run_log"
          set +e
          "$VM64E2E_BIN" resume \
            --checkpoint "$checkpoint" \
            --repo-root "$GITHUB_WORKSPACE" \
            --source-sha "$SOURCE_SHA" \
            --global-timeout "${remaining_seconds}s" 2>&1 | tee -a "$run_log"
          resume_pipeline_status=("${PIPESTATUS[@]}")
          resume_status=${resume_pipeline_status[0]}
          resume_log_status=${resume_pipeline_status[1]}
          set -e
          if [ "$resume_log_status" -ne 0 ]; then
            echo 'Could not preserve the resumed lifecycle log; refusing to hide the artifact failure.' >&2
            exit "$resume_log_status"
          fi
          exit "$resume_status"

      - name: Independently finalize owned resources
        if: always()
        timeout-minutes: 20
        shell: bash
        run: |
          set -Eeuo pipefail
          run_log="$RUNNER_TEMP/vm64e2e-run.log"
          if [ -s "$run_log" ]; then
            if ! cp "$run_log" "$ARTIFACT_DIR/vm64e2e-run.log"; then
              echo 'Warning: could not preserve the vm64e2e runner log before finalization.' >&2
            fi
          fi
          ownership="$ARTIFACT_DIR/ownership.json"
          if [ ! -s "$ownership" ]; then
            echo 'No ownership record exists; no enclave reached the ownership boundary.'
            exit 0
          fi
          if [ ! -x "$VM64E2E_BIN" ]; then
            echo 'The vm64e2e binary is unavailable for finalization.' >&2
            exit 1
          fi
          "$VM64E2E_BIN" finalize \
            --ownership "$ownership" \
            --results "$ARTIFACT_DIR" \
            --timeout 18m \
            --destroy-preserved

      - name: Write VM64 result summary
        if: always()
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - "$ARTIFACT_DIR/results.json" >> "$GITHUB_STEP_SUMMARY" <<'PY'
          import json
          import sys
          from pathlib import Path

          path = Path(sys.argv[1])
          print("## VM64 end-to-end lifecycle")
          if not path.is_file():
              print("\n`results.json` was not produced. Inspect the uploaded diagnostics.")
              raise SystemExit(0)
          try:
              results = json.loads(path.read_text(encoding="utf-8"))
          except Exception as error:
              print(f"\n`results.json` could not be decoded: {error}")
              raise SystemExit(0)

          def cell(value):
              return str(value or "").replace("|", "\\|").replace("\n", " ")

          print(f"\nOverall status: **{cell(results.get('status', 'unknown'))}**")
          print(f"\nRun ID: `{cell(results.get('run_id', 'unknown'))}`")
          print("\n| Stage | Attempt | Status | Duration | Message |")
          print("| --- | ---: | --- | ---: | --- |")
          for stage in results.get("stages", []):
              duration = f"{int(stage.get('duration_ms', 0)) / 1000:.1f}s"
              print(
                  f"| {cell(stage.get('name'))} | {cell(stage.get('attempt'))} | "
                  f"{cell(stage.get('status'))} | {duration} | {cell(stage.get('message'))} |"
              )
          suites = results.get("suites", [])
          if suites:
              print("\n| Suite | Stage | Status |")
              print("| --- | --- | --- |")
              for suite in suites:
                  print(
                      f"| {cell(suite.get('name'))} | {cell(suite.get('stage'))} | "
                      f"{cell(suite.get('status'))} |"
                  )
          PY

      - name: Upload complete VM64 artifacts
        if: always()
        timeout-minutes: 10
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: vm64-e2e-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.ARTIFACT_DIR }}
          if-no-files-found: warn
          retention-days: 14
